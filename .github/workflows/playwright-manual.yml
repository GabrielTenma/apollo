name: Playwright Tests – Manual

on:
  workflow_dispatch:
    inputs:
      cache-node-modules:
        description: Restore cached node_modules from previous runs
        required: false
        default: true
        type: boolean
      cache-playwright-browsers:
        description: Restore cached Playwright browsers from previous runs
        required: false
        default: true
        type: boolean
      force-install:
        description: Force fresh install even if cache is hit (ignores both cache inputs)
        required: false
        default: false
        type: boolean
      browser:
        description: Browser to run tests against
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all
      test-file:
        description: Path to the Playwright test file to run
        required: false
        default: tests/coinmarketcap.target.spec.ts
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Cache node_modules
        if: ${{ inputs.force-install != true && inputs.cache-node-modules == true }}
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Skip node_modules cache  (force fresh install)
        if: ${{ inputs.force-install == true || inputs.cache-node-modules != true }}
        run: echo "Skipping node_modules cache – force fresh install."

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright Browsers
        if: ${{ inputs.force-install != true && inputs.cache-playwright-browsers == true }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Skip Playwright browser cache  (force fresh download)
        if: ${{ inputs.force-install == true || inputs.cache-playwright-browsers != true }}
        run: echo "Skipping Playwright browser cache – force fresh download."

      - name: Install Playwright Browsers
        # On cache-hit `npx playwright install` is a near-instant no-op.
        # `--with-deps` installs system libraries; skipped when the cache dir already exists.
        # When force-install is true, always run with --with-deps to guarantee a real download.
        run: |
          if [ "${{ inputs.force-install }}" = "true" ] || [ ! -d "$HOME/.cache/ms-playwright" ]; then
            npx playwright install --with-deps
          else
            npx playwright install
          fi

      - name: Run Playwright tests
        run: npx playwright test ${{ inputs.test-file }} --project=${{ inputs.browser }}

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.browser }}
          path: playwright-report/
          retention-days: 30
